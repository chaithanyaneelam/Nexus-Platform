<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Nexus Platform</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .admin-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
      }

      .admin-header {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        margin-bottom: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .admin-header h1 {
        color: #333;
        margin: 0;
        font-size: 2rem;
      }

      .admin-user-info {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .admin-user-info span {
        padding: 0.5rem 1rem;
        background: #667eea;
        color: white;
        border-radius: 6px;
        font-weight: 500;
      }

      .logout-btn {
        padding: 0.5rem 1.5rem;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.3s;
      }

      .logout-btn:hover {
        background: #dc2626;
      }

      .admin-tabs {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        background: white;
        padding: 1rem;
        border-radius: 12px;
        border-bottom: 3px solid #667eea;
      }

      .tab-btn {
        padding: 0.75rem 1.5rem;
        background: transparent;
        border: 2px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        color: #666;
        transition: all 0.3s;
      }

      .tab-btn.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }

      .tab-btn:hover {
        background: #f0f0f0;
      }

      .tab-btn.active:hover {
        background: #667eea;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* Course Approval Styles */
      .course-approval-card {
        background: white;
        border: 2px solid #ddd;
        border-radius: 12px;
        padding: 2rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: all 0.3s;
      }

      .course-approval-card:hover {
        border-color: #667eea;
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        transform: translateY(-2px);
      }

      .course-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 1.5rem;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 1rem;
      }

      .course-header h3 {
        margin: 0;
        color: #333;
        font-size: 1.3rem;
      }

      .status-badge {
        display: inline-block;
        padding: 0.5rem 1rem;
        background: #fbbf24;
        color: #92400e;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.85rem;
      }

      .course-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }

      @media (max-width: 768px) {
        .course-details {
          grid-template-columns: 1fr;
        }
      }

      .detail-item {
        display: flex;
        flex-direction: column;
      }

      .detail-label {
        font-weight: 600;
        color: #667eea;
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
      }

      .detail-value {
        color: #333;
        font-size: 1rem;
        line-height: 1.5;
      }

      .highlights-section {
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: #f9fafb;
        border-radius: 8px;
        border-left: 4px solid #667eea;
      }

      .highlights-section h4 {
        margin: 0 0 0.75rem 0;
        color: #667eea;
        font-size: 0.95rem;
      }

      .highlights-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .highlights-list li {
        padding: 0.5rem 0;
        color: #555;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .highlights-list li:before {
        content: "✓ ";
        color: #10b981;
        font-weight: bold;
        margin-right: 0.5rem;
      }

      .action-buttons {
        display: flex;
        gap: 1rem;
      }

      .action-btn {
        flex: 1;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s;
      }

      .approve-btn {
        background: #10b981;
        color: white;
      }

      .approve-btn:hover {
        background: #059669;
        transform: translateY(-2px);
      }

      .reject-btn {
        background: #ef4444;
        color: white;
      }

      .reject-btn:hover {
        background: #dc2626;
        transform: translateY(-2px);
      }

      /* Payment Management Styles */
      .payment-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: white;
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        text-align: center;
        border-top: 4px solid #667eea;
      }

      .stat-card h3 {
        margin: 0 0 1rem 0;
        color: #666;
        font-size: 0.95rem;
        text-transform: uppercase;
        font-weight: 600;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: bold;
        color: #667eea;
      }

      .payment-table {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }

      .payment-table table {
        width: 100%;
        border-collapse: collapse;
      }

      .payment-table th {
        background: #f9fafb;
        padding: 1.25rem;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-bottom: 2px solid #e5e7eb;
        font-size: 0.9rem;
      }

      .payment-table td {
        padding: 1.25rem;
        border-bottom: 1px solid #e5e7eb;
        color: #555;
      }

      .payment-table tr:hover {
        background: #f9fafb;
      }

      .status-badge.pending {
        background: #fef3c7;
        color: #92400e;
      }

      .status-badge.completed {
        background: #d1fae5;
        color: #065f46;
      }

      .release-btn {
        padding: 0.5rem 1rem;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.3s;
      }

      .release-btn:hover {
        background: #5568d3;
      }

      .no-data {
        text-align: center;
        padding: 3rem;
        color: #999;
        font-size: 1.1rem;
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: #667eea;
        font-size: 1.1rem;
      }

      .notification {
        padding: 1rem 1.5rem;
        margin-bottom: 1.5rem;
        border-radius: 8px;
        font-weight: 500;
        animation: slideIn 0.3s ease;
      }

      .notification.success {
        background: #d1fae5;
        color: #065f46;
        border-left: 4px solid #10b981;
      }

      .notification.error {
        background: #fee2e2;
        color: #991b1b;
        border-left: 4px solid #ef4444;
      }

      @keyframes slideIn {
        from {
          transform: translateY(-10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .empty-state {
        text-align: center;
        padding: 3rem 2rem;
        background: white;
        border-radius: 12px;
        border: 2px dashed #ddd;
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .empty-state-text {
        color: #666;
        font-size: 1.1rem;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <!-- Admin Header -->
      <div class="admin-header">
        <div>
          <h1>🛡️ Admin Dashboard</h1>
          <p style="margin: 0; color: #999; font-size: 0.9rem">
            Manage courses, payments, and platform content
          </p>
        </div>
        <div class="admin-user-info">
          <span id="adminEmail">Admin</span>
          <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
        </div>
      </div>

      <!-- Notification Area -->
      <div id="notification"></div>

      <!-- Admin Tabs -->
      <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('courses')">
          📚 Course Approvals
        </button>
        <button class="tab-btn" onclick="switchTab('enrollments')">
          👥 Student Approvals
        </button>
        <button class="tab-btn" onclick="switchTab('teachers')">
          🏫 Teachers Management
        </button>
        <button class="tab-btn" onclick="switchTab('payments')">
          💰 Payment Management
        </button>
      </div>

      <!-- Tab: Course Approvals -->
      <div id="courses" class="tab-content active">
        <div id="coursesContent">
          <div class="loading">Loading pending courses...</div>
        </div>
      </div>

      <!-- Tab: Student Approvals -->
      <div id="enrollments" class="tab-content">
        <div id="enrollmentsContent">
          <div class="loading">Loading pending enrollments...</div>
        </div>
      </div>

      <!-- Tab: Teachers Management -->
      <div id="teachers" class="tab-content">
        <div id="teachersContent">
          <div class="loading">Loading teachers...</div>
        </div>
      </div>

      <!-- Tab: Payment Management -->
      <div id="payments" class="tab-content">
        <div id="paymentsContent">
          <div class="loading">Loading payment data...</div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      // Initialize admin panel
      async function initAdmin() {
        const user = auth.getCurrentUser();
        const token = localStorage.getItem("token");

        // Check if user is admin
        if (!user || user.role !== "admin") {
          alert("Access Denied: Admin only");
          window.location.href = "index.html#login";
          return;
        }

        // Display admin email
        document.getElementById("adminEmail").textContent = user.email;

        // Load initial data
        loadPendingCourses();
        loadStudentApprovals();
        loadTeachersManagement();
        loadPaymentData();
      }

      // Switch between tabs
      function switchTab(tabName) {
        // Hide all tabs
        document
          .querySelectorAll(".tab-content")
          .forEach((tab) => tab.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));

        // Show selected tab
        document.getElementById(tabName).classList.add("active");
        event.target.classList.add("active");

        // Load data for specific tab
        if (tabName === "courses") {
          loadPendingCourses();
        } else if (tabName === "enrollments") {
          loadStudentApprovals();
        } else if (tabName === "teachers") {
          loadTeachersManagement();
        } else if (tabName === "payments") {
          loadPaymentData();
        }
      }

      // Load pending courses
      async function loadPendingCourses() {
        const container = document.getElementById("coursesContent");
        container.innerHTML = '<div class="loading">Loading courses...</div>';

        try {
          const response = await api.getPendingCourses();
          const courses = response.data || [];

          if (courses.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">✅</div>
                <p class="empty-state-text">No pending courses to review!</p>
              </div>
            `;
            return;
          }

          let html = "";
          for (const course of courses) {
            html += `
              <div class="course-approval-card">
                <div class="course-header">
                  <h3>${course.title}</h3>
                  <span class="status-badge">Pending Approval</span>
                </div>
                
                <div class="course-details">
                  <div class="detail-item">
                    <span class="detail-label">Teacher</span>
                    <span class="detail-value" id="teacher-${course._id}">Loading...</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Duration</span>
                    <span class="detail-value">${course.duration} months</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Price</span>
                    <span class="detail-value">₹${course.price}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Company</span>
                    <span class="detail-value">${course.company}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Role</span>
                    <span class="detail-value">${course.role}</span>
                  </div>
                </div>

                <div class="detail-item">
                  <span class="detail-label">Description</span>
                  <span class="detail-value">${course.description}</span>
                </div>

                <div class="highlights-section">
                  <h4>📋 Key Highlights</h4>
                  <ul class="highlights-list">
                    ${course.highlights.map((h) => `<li>${h}</li>`).join("")}
                  </ul>
                </div>

                <div class="action-buttons">
                  <button class="action-btn approve-btn" onclick="approveCourse('${course._id}')">
                    ✓ Approve Course
                  </button>
                  <button class="action-btn reject-btn" onclick="rejectCourse('${course._id}')">
                    ✗ Reject Course
                  </button>
                </div>
              </div>
            `;
          }

          container.innerHTML = html;
        } catch (error) {
          container.innerHTML = `
            <div class="notification error" style="margin: 0;">
              Error loading courses: ${error.message}
            </div>
          `;
        }
      }

      // Approve course
      async function approveCourse(courseId) {
        try {
          const response = await api.approveCourse(courseId);
          if (response.success) {
            showNotification("Course approved successfully!", "success");
            setTimeout(() => loadPendingCourses(), 1000);
          } else {
            showNotification(response.message || "Approval failed", "error");
          }
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      // Reject course
      async function rejectCourse(courseId) {
        if (!confirm("Are you sure you want to reject this course?")) {
          return;
        }

        try {
          const response = await api.rejectCourse(courseId);
          if (response.success) {
            showNotification("Course rejected successfully!", "success");
            setTimeout(() => loadPendingCourses(), 1000);
          } else {
            showNotification(response.message || "Rejection failed", "error");
          }
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      // Load payment data
      async function loadPaymentData() {
        const container = document.getElementById("paymentsContent");
        container.innerHTML =
          '<div class="loading">Loading payment management...</div>';

        try {
          const [statsResponse, pendingResponse, usersResponse] =
            await Promise.all([
              api.getAdminDashboardStats(),
              api.getAdminPendingPayments(1, 50),
              api.getAllUsers("teacher", 1, 50),
            ]);

          const stats = statsResponse.data || {};
          const pendingPayments = pendingResponse.data || [];
          const teachers = usersResponse.data || [];

          const duesPromises = teachers.map(async (teacher) => {
            try {
              const dues = await api.getTeacherPendingDues(teacher._id);
              return {
                teacher,
                pendingPayments: dues.data?.pendingPayments || [],
                totalDue: dues.data?.totalDue || 0,
              };
            } catch (error) {
              return {
                teacher,
                pendingPayments: [],
                totalDue: 0,
              };
            }
          });

          const duesByTeacher = await Promise.all(duesPromises);

          container.innerHTML = `
            <div class="payment-stats">
              <div class="stat-card">
                <h3>Pending Enrollment Approvals</h3>
                <div class="stat-value">${stats.pendingEnrollments || 0}</div>
              </div>
              <div class="stat-card">
                <h3>Payment Queue</h3>
                <div class="stat-value">${stats.pendingPayments || 0}</div>
              </div>
              <div class="stat-card">
                <h3>Escrow Ready For Settlement</h3>
                <div class="stat-value">${stats.approvedPayments || 0}</div>
              </div>
              <div class="stat-card">
                <h3>Total Commission Earned</h3>
                <div class="stat-value">₹${stats.totalCommissionEarned || 0}</div>
              </div>
            </div>

            <h3 style="color: #333; margin-bottom: 1rem;">Student Payment Queue</h3>
            <div class="payment-table" style="margin-bottom: 2rem;">
              <table>
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Course</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Transaction ID</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="paymentsTableBody">
                  ${
                    pendingPayments.length > 0
                      ? pendingPayments
                          .map(
                            (payment) => `
                        <tr>
                          <td>${payment.studentId?.name || "Unknown"}</td>
                          <td>${payment.courseId?.title || "Unknown"}</td>
                          <td>₹${payment.amount || 0}</td>
                          <td><span class="status-badge pending">${payment.status || "payment_requested"}</span></td>
                          <td>${payment.transactionId || "Not submitted"}</td>
                          <td>
                            ${
                              payment.status === "transaction_submitted"
                                ? `<button class="release-btn" onclick="confirmStudentPayment('${payment._id}')">Confirm Receipt</button>
                                   <button class="release-btn" style="background:#ef4444; margin-top:0.5rem;" onclick="rejectStudentPayment('${payment._id}')">Reject</button>`
                                : `<span style="color:#666; font-size:0.9rem;">Waiting for student payment</span>`
                            }
                          </td>
                        </tr>
                      `,
                          )
                          .join("")
                      : "<tr><td colspan='6' class='no-data'>No pending payment tasks.</td></tr>"
                  }
                </tbody>
              </table>
            </div>

            <h3 style="color: #333; margin-bottom: 1rem;">Teacher Settlement Queue</h3>
            <div class="payment-table">
              <table>
                <thead>
                  <tr>
                    <th>Teacher</th>
                    <th>Total Due</th>
                    <th>Pending Settlement Items</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="teacherSettlementBody">
                  ${
                    duesByTeacher.filter((d) => d.pendingPayments.length > 0)
                      .length > 0
                      ? duesByTeacher
                          .filter((d) => d.pendingPayments.length > 0)
                          .map(
                            (d) => `
                        <tr>
                          <td>${d.teacher.name || d.teacher.email || "Teacher"}</td>
                          <td>₹${d.totalDue || 0}</td>
                          <td>${d.pendingPayments.length}</td>
                          <td>
                            ${d.pendingPayments
                              .map(
                                (p) =>
                                  `<button class="release-btn" style="margin-bottom:0.5rem;" onclick="settleTeacherPaymentItem('${p._id}')">Settle ₹${p.teacherPayment || 0}</button>`,
                              )
                              .join("")}
                          </td>
                        </tr>
                      `,
                          )
                          .join("")
                      : "<tr><td colspan='4' class='no-data'>No teacher settlements pending.</td></tr>"
                  }
                </tbody>
              </table>
            </div>
          `;
        } catch (error) {
          container.innerHTML = `
            <div class="notification error" style="margin: 0;">
              Error loading payment data: ${error.message}
            </div>
          `;
        }
      }

      async function confirmStudentPayment(paymentId) {
        if (
          !confirm(
            "Confirm this student payment receipt and activate enrollment?",
          )
        ) {
          return;
        }

        try {
          await api.approvePayment(paymentId);
          showNotification(
            "Student payment confirmed and enrollment activated",
            "success",
          );
          loadPaymentData();
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      async function rejectStudentPayment(paymentId) {
        const reason = prompt("Enter rejection reason:");
        if (!reason || !reason.trim()) {
          return;
        }

        try {
          await api.rejectPayment(paymentId, reason.trim());
          showNotification("Payment rejected", "success");
          loadPaymentData();
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      async function settleTeacherPaymentItem(paymentId) {
        if (!confirm("Settle this amount to teacher now?")) {
          return;
        }

        try {
          await api.settleTeacherPayment(paymentId);
          showNotification("Settlement successful", "success");
          loadPaymentData();
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      // Show notification
      function showNotification(message, type) {
        const notification = document.getElementById("notification");
        notification.innerHTML = `
          <div class="notification ${type}">
            ${message}
          </div>
        `;
        setTimeout(() => {
          notification.innerHTML = "";
        }, 4000);
      }

      // Logout
      function logoutAdmin() {
        auth.logout();
        window.location.href = "index.html#login";
      }

      // Load pending student enrollments
      async function loadStudentApprovals() {
        const container = document.getElementById("enrollmentsContent");
        container.innerHTML =
          '<div class="loading">Loading pending enrollments...</div>';

        try {
          const response = await api.getPendingEnrollments(1, 10);
          const enrollments = response.data || [];

          if (enrollments.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">✅</div>
                <p class="empty-state-text">No pending student enrollments to review!</p>
              </div>
            `;
            return;
          }

          let html = `
            <div style="margin-bottom: 2rem;">
              <h3 style="color: #333; margin: 0 0 1rem 0; font-size: 1.3rem;">
                📋 Pending Student Enrollments (${enrollments.length})
              </h3>
              <p style="color: #666; margin: 0;">Review and approve or reject student course enrollments below</p>
            </div>
          `;

          for (const enrollment of enrollments) {
            const student = enrollment.studentId || {};
            const course = enrollment.courseId || {};
            const teacher = course.teacherId || {};
            const enrollDate = new Date(
              enrollment.enrolledAt,
            ).toLocaleDateString();

            html += `
              <div class="course-approval-card" style="margin-bottom: 2rem;">
                <!-- Header with Course Title and Status -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #f0f0f0;">
                  <div>
                    <h3 style="margin: 0 0 0.5rem 0; color: #333; font-size: 1.2rem;">
                      📚 ${course.title || "Unknown Course"}
                    </h3>
                    <p style="margin: 0; color: #999; font-size: 0.9rem;">
                      Requested on ${enrollDate}
                    </p>
                  </div>
                  <span class="status-badge" style="background: #fef3c7; color: #92400e; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600;">⏳ Pending Approval</span>
                </div>

                <!-- Main Content Grid -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                  
                  <!-- Teacher Information -->
                  <div style="background: #f0f4ff; border-left: 4px solid #3b82f6; padding: 1.5rem; border-radius: 8px;">
                    <h4 style="color: #3b82f6; margin: 0 0 1rem 0; font-size: 1rem; font-weight: 600;">
                      👨‍🏫 Teacher Information
                    </h4>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Name</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333; font-weight: 600;">${teacher.name || "Unknown"}</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Company</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333;">${teacher.company || "N/A"}</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Role/Profession</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333;">${teacher.profession || teacher.role || "Instructor"}</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Email</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333;">${teacher.email || "N/A"}</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Mobile</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333;">${teacher.mobileNumber || "N/A"}</p>
                      </div>
                    </div>
                  </div>

                  <!-- Course Information -->
                  <div style="background: #f3fdf8; border-left: 4px solid #10b981; padding: 1.5rem; border-radius: 8px;">
                    <h4 style="color: #10b981; margin: 0 0 1rem 0; font-size: 1rem; font-weight: 600;">
                      📖 Course Details
                    </h4>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Course Name</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333; font-weight: 600;">${course.title || "Unknown Course"}</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Duration</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333;">${course.duration || "N/A"} months</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Cost</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333; font-weight: 600; font-size: 1.1rem;">₹${course.price || 0}</p>
                      </div>
                      <div>
                        <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Description</span>
                        <p style="margin: 0.25rem 0 0 0; color: #333; font-size: 0.9rem;">${course.description || "No description available"}</p>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Student Information -->
                <div style="background: #fef3c7; border-left: 4px solid #ff9800; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                  <h4 style="color: #856404; margin: 0 0 1rem 0; font-size: 1rem; font-weight: 600;">
                    👤 Student Information
                  </h4>
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                      <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Name</span>
                      <p style="margin: 0.25rem 0 0 0; color: #333; font-weight: 600;">${student.name || "Unknown"}</p>
                    </div>
                    <div>
                      <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Email</span>
                      <p style="margin: 0.25rem 0 0 0; color: #333;">${student.email || "N/A"}</p>
                    </div>
                    <div>
                      <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Mobile</span>
                      <p style="margin: 0.25rem 0 0 0; color: #333;">${student.mobileNumber || "N/A"}</p>
                    </div>
                    <div>
                      <span style="color: #999; font-size: 0.85rem; text-transform: uppercase; font-weight: 600;">Enrollment ID</span>
                      <p style="margin: 0.25rem 0 0 0; color: #333; font-size: 0.85rem; font-family: monospace;">${enrollment._id || "N/A"}</p>
                    </div>
                  </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                  <button class="action-btn approve-btn" onclick="requestPaymentForEnrollment('${enrollment._id}')" 
                          style="flex: 1; padding: 1rem; background: #10b981; color: white; border: none; border-radius: 6px; 
                                  font-weight: 600; cursor: pointer; font-size: 1rem; transition: background 0.3s;"
                          onmouseover="this.style.background='#059669'"
                          onmouseout="this.style.background='#10b981'">
                    💳 Request to Pay (₹${course.price || 0})
                  </button>
                  <button class="action-btn reject-btn" onclick="rejectEnrollment('${enrollment._id}')"
                          style="flex: 1; padding: 1rem; background: #ef4444; color: white; border: none; border-radius: 6px; 
                                  font-weight: 600; cursor: pointer; font-size: 1rem; transition: background 0.3s;"
                          onmouseover="this.style.background='#dc2626'"
                          onmouseout="this.style.background='#ef4444'">
                    ✗ Reject Student
                  </button>
                </div>
              </div>
            `;
          }

          container.innerHTML = html;
        } catch (error) {
          container.innerHTML = `
            <div class="notification error" style="margin: 0;">
              Error loading enrollments: ${error.message}
            </div>
          `;
        }
      }

      // Request payment from student for selected enrollment
      async function requestPaymentForEnrollment(enrollmentId) {
        try {
          const response = await api.requestPayment(enrollmentId);
          if (response.success || response.data) {
            showNotification(
              "Request to Pay sent to student successfully!",
              "success",
            );
            setTimeout(() => loadStudentApprovals(), 1000);
          } else {
            showNotification(
              response.message || "Request to Pay failed",
              "error",
            );
          }
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      // Reject student enrollment
      async function rejectEnrollment(enrollmentId) {
        const reason = prompt("Please provide a reason for rejection:");

        if (reason === null || reason.trim() === "") {
          showNotification("Rejection cancelled or no reason provided", "info");
          return;
        }

        try {
          const response = await api.rejectEnrollment(enrollmentId, reason);
          if (response.success || response.data) {
            showNotification(
              "Student enrollment rejected successfully!",
              "success",
            );
            setTimeout(() => loadStudentApprovals(), 1000);
          } else {
            showNotification(response.message || "Rejection failed", "error");
          }
        } catch (error) {
          showNotification(error.message, "error");
        }
      }

      // Load teachers management
      async function loadTeachersManagement() {
        const container = document.getElementById("teachersContent");
        container.innerHTML = '<div class="loading">Loading teachers...</div>';

        try {
          const response = await api.getAllTeachersWithCourses(1, 10);
          const teachers = response.data || [];

          if (teachers.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">👥</div>
                <p class="empty-state-text">No teachers found!</p>
              </div>
            `;
            return;
          }

          let html =
            '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;">';

          for (const teacherData of teachers) {
            const teacher = teacherData.teacher || {};
            const courses = teacherData.courses || [];
            const totalStudents = courses.reduce(
              (sum, c) => sum + (c.activeStudentCount || 0),
              0,
            );

            html += `
              <div class="course-approval-card">
                <div class="course-header">
                  <div>
                    <h3>${teacher.name || "Unknown"}</h3>
                    <p style="margin: 0.25rem 0; color: #666; font-size: 0.9rem;">
                      ${teacher.company || "N/A"} • ${teacher.profession || "Instructor"}
                    </p>
                  </div>
                </div>
                
                <div class="course-details">
                  <div class="detail-item">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">${teacher.email || "N/A"}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Mobile</span>
                    <span class="detail-value">${teacher.mobileNumber || "N/A"}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Courses</span>
                    <span class="detail-value">${courses.length}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Active Students</span>
                    <span class="detail-value">${totalStudents}</span>
                  </div>
                </div>

                <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #ddd;">
                  <button class="action-btn approve-btn" style="flex: 1; margin-bottom: 0.5rem;" 
                    onclick="viewTeacherCourses('${teacher._id}', '${teacher.name}')">
                    📚 View Courses & Students
                  </button>
                </div>
              </div>
            `;
          }

          html += "</div>";
          container.innerHTML = html;
        } catch (error) {
          container.innerHTML = `
            <div class="notification error" style="margin: 0;">
              Error loading teachers: ${error.message}
            </div>
          `;
        }
      }

      // View teacher's courses and students
      async function viewTeacherCourses(teacherId, teacherName) {
        const container = document.getElementById("teachersContent");
        let html = `
          <div style="margin-bottom: 1.5rem;">
            <button class="action-btn" style="background: #667eea; color: white; padding: 0.5rem 1rem;" 
              onclick="loadTeachersManagement()">← Back to Teachers</button>
            <h2 style="margin: 1rem 0; color: #333;">${teacherName}'s Courses & Students</h2>
          </div>
          <div class="loading">Loading courses...</div>
        `;
        container.innerHTML = html;

        try {
          const response = await api.getTeacherCoursesWithStudents(
            teacherId,
            1,
            10,
          );
          const courses = response.data || [];

          if (courses.length === 0) {
            container.innerHTML += `
              <div class="empty-state">
                <div class="empty-state-icon">📚</div>
                <p class="empty-state-text">No courses found for this teacher!</p>
              </div>
            `;
            return;
          }

          let courseHtml =
            '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">';

          for (const course of courses) {
            courseHtml += `
              <div class="course-approval-card">
                <div class="course-header">
                  <h3>${course.title}</h3>
                  <span class="status-badge" style="background: #eff6ff; color: #1e40af;">
                    ${course.status === "published" ? "Published" : "Draft"}
                  </span>
                </div>
                
                <div class="course-details">
                  <div class="detail-item">
                    <span class="detail-label">Price</span>
                    <span class="detail-value">₹${course.price}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Duration</span>
                    <span class="detail-value">${course.duration} months</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Active Students</span>
                    <span class="detail-value" style="font-size: 1.25rem; font-weight: bold; color: #10b981;">
                      ${course.activeStudentCount}
                    </span>
                  </div>
                </div>

                <button class="action-btn approve-btn" 
                  onclick="viewCourseStudents('${course._id}', '${course.title}')">
                  👥 View Enrolled Students
                </button>
              </div>
            `;
          }

          courseHtml += "</div>";
          document.getElementById("teachersContent").innerHTML =
            html.replace(
              "Loading courses...</div>",
              courseHtml.replace(
                '<div class="loading">Loading courses...</div>',
                "",
              ),
            ) + courseHtml;
        } catch (error) {
          container.innerHTML += `
            <div class="notification error" style="margin: 0;">
              Error loading courses: ${error.message}
            </div>
          `;
        }
      }

      // View students in a course
      async function viewCourseStudents(courseId, courseName) {
        const container = document.getElementById("teachersContent");
        let html = `
          <div style="margin-bottom: 1.5rem;">
            <button class="action-btn" style="background: #667eea; color: white; padding: 0.5rem 1rem;" 
              onclick="loadTeachersManagement()">← Back to Teachers</button>
            <h2 style="margin: 1rem 0; color: #333;">Students in "${courseName}"</h2>
          </div>
          <div class="loading">Loading students...</div>
        `;
        container.innerHTML = html;

        try {
          // Get enrollments for this specific course
          const response = await api.request(
            `/enrollments/course/${courseId}/enrollments`,
            "GET",
            null,
            true,
          );
          const enrollments = response.data || [];

          // Filter for active enrollments
          const activeEnrollments = enrollments.filter(
            (e) => e.status === "active",
          );

          const studentHtml = `
            <div style="margin-top: 2rem;">
              <h3 style="color: #333; margin-bottom: 1rem;">Enrolled Students (${activeEnrollments.length})</h3>
              ${
                activeEnrollments.length > 0
                  ? `
                <div style="display: grid; gap: 1rem;">
                  ${activeEnrollments
                    .map((e) => {
                      const student = e.studentId || {};
                      const enrollDate = new Date(
                        e.enrolledAt,
                      ).toLocaleDateString();
                      return `
                    <div style="background: white; padding: 1.5rem; border-radius: 8px; border-left: 4px solid #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: center;">
                        <div>
                          <p style="margin: 0; font-weight: 600; color: #333;">👤 ${student.name || "Unknown"}</p>
                          <p style="margin: 0.25rem 0; color: #666; font-size: 0.9rem;">📧 ${student.email || "N/A"}</p>
                          <p style="margin: 0.25rem 0; color: #666; font-size: 0.9rem;">📱 ${student.mobileNumber || "N/A"}</p>
                        </div>
                        <div>
                          <p style="margin: 0; font-size: 0.85rem; color: #999;">📅 Enrolled: ${enrollDate}</p>
                          <p style="margin: 0.25rem 0; font-weight: 600; color: #667eea;">⚡ Progress: ${e.progress || 0}%</p>
                        </div>
                      </div>
                    </div>
                  `;
                    })
                    .join("")}
                </div>
              `
                  : `
                <div class="empty-state" style="text-align: center; padding: 2rem;">
                  <p style="color: #999;">No active students enrolled in this course</p>
                </div>
              `
              }
            </div>
          `;

          document.getElementById("teachersContent").innerHTML =
            html + studentHtml;
        } catch (error) {
          container.innerHTML += `
            <div class="notification error" style="margin: 0;">
              Error loading students: ${error.message}
            </div>
          `;
        }
      }

      // Initialize on page load
      window.addEventListener("load", initAdmin);
    </script>
  </body>
</html>
