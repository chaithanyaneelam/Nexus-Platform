<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Platform - Learn from Industry Experts</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="navbar-container">
        <div class="navbar-brand">
          <h1>🚀 Nexus Platform</h1>
        </div>
        <ul class="navbar-menu" id="navbarMenu">
          <li><a href="#home" class="nav-link">Home</a></li>
          <!-- Dynamic menu items based on role -->
          <li id="coursesMenuItem" style="display: none">
            <a href="#courses" class="nav-link">Courses</a>
          </li>
          <li id="yourCoursesMenuItem" style="display: none">
            <a href="#your-courses" class="nav-link">Your Courses</a>
          </li>
          <li id="myEnrollmentsMenuItem" style="display: none">
            <a href="#my-enrollments" class="nav-link">My Enrollments</a>
          </li>
          <li id="myCoursesMenuItem" style="display: none">
            <a href="#my-courses" class="nav-link">My Courses</a>
          </li>
          <li id="studentsMenuItem" style="display: none">
            <a href="#teacher-students" class="nav-link">Students</a>
          </li>
          <li id="adminMenuItem" style="display: none">
            <a href="#admin-dashboard" class="nav-link">Admin Dashboard</a>
          </li>
          <li style="position: relative">
            <a
              href="javascript:void(0)"
              class="nav-link"
              id="settingsLink"
              style="display: none; cursor: pointer"
              onclick="
                toggleSettingsMenu();
                return false;
              "
              >⚙️ Settings</a
            >
            <div
              class="settings-dropdown"
              id="settingsMenu"
              style="display: none"
            >
              <a
                href="javascript:void(0)"
                onclick="
                  goToProfile();
                  return false;
                "
                style="
                  padding: 0.75rem 1rem;
                  display: block;
                  color: #333;
                  text-decoration: none;
                  border-bottom: 1px solid #eee;
                  cursor: pointer;
                "
                >👤 Profile</a
              >
              <a
                href="javascript:void(0)"
                onclick="
                  logout();
                  return false;
                "
                style="
                  padding: 0.75rem 1rem;
                  display: block;
                  color: #d32f2f;
                  text-decoration: none;
                  cursor: pointer;
                "
                >🚪 Logout</a
              >
            </div>
          </li>
          <li>
            <a href="#login" class="nav-link" id="loginLink">Login</a>
          </li>
        </ul>
        <div class="user-info" id="userInfo" style="display: none">
          <span id="userName"></span>
          <span class="role-badge" id="userRole"></span>
        </div>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div id="app" class="app-container">
      <!-- This will be populated by the router -->
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>
        &copy; 2024 Nexus Platform. Learn from Industry Experts. All rights
        reserved.
      </p>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
