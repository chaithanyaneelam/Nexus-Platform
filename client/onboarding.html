<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Your Profile � StudBridge Onboarding</title>
    <meta
      name="description"
      content="Set up your StudBridge profile to get started. Choose your role as a student or teacher and connect your LinkedIn and GitHub accounts."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://studbridge.com/onboarding.html" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studbridge.com/onboarding.html" />
    <meta property="og:title" content="Complete Your Profile � StudBridge" />
    <meta
      property="og:description"
      content="Just a few details to set up your StudBridge account and launch your dashboard."
    />
    <meta
      property="og:image"
      content="https://studbridge.com/assets/og-image.png"
    />
    <meta property="og:site_name" content="StudBridge" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script src="js/router.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #fff;
      }

      /* Background animated glowing orbs */
      .bg-shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        animation: float 10s infinite ease-in-out alternate;
      }
      .shape1 {
        width: 300px;
        height: 300px;
        background: rgba(56, 189, 248, 0.3);
        top: -10%;
        left: -10%;
        animation-delay: 0s;
      }
      .shape2 {
        width: 400px;
        height: 400px;
        background: rgba(168, 85, 247, 0.3);
        bottom: -20%;
        right: -10%;
        animation-delay: -5s;
      }
      .shape3 {
        width: 250px;
        height: 250px;
        background: rgba(16, 185, 129, 0.2);
        bottom: 20%;
        left: 20%;
        animation-delay: -2s;
      }

      @keyframes float {
        0% {
          transform: translateY(0) scale(1);
        }
        100% {
          transform: translateY(-30px) scale(1.1);
        }
      }

      /* Popup Animation Setup */
      .onboarding-overlay {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 550px;
        perspective: 1000px;
      }

      .onboarding-popup {
        background: rgba(30, 41, 59, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);

        /* Scale In and Spin Slightly Animation */
        opacity: 0;
        transform: scale(0.8) rotateX(-10deg);
        animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 0.2s;
      }

      @keyframes popIn {
        100% {
          opacity: 1;
          transform: scale(1) rotateX(0);
        }
      }

      .welcome-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .welcome-header span {
        display: inline-block;
        font-size: 3rem;
        margin-bottom: 0.5rem;
        animation: wave 2.5s infinite;
        transform-origin: 70% 70%;
      }

      @keyframes wave {
        0% {
          transform: rotate(0deg);
        }
        10% {
          transform: rotate(14deg);
        }
        20% {
          transform: rotate(-8deg);
        }
        30% {
          transform: rotate(14deg);
        }
        40% {
          transform: rotate(-4deg);
        }
        50% {
          transform: rotate(10deg);
        }
        60% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }

      .onboarding-title {
        font-size: 2.2rem;
        color: #38bdf8;
        margin: 0;
        font-weight: 800;
        background: linear-gradient(to right, #38bdf8, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .onboarding-subtitle {
        color: #cbd5e1;
        margin-top: 0.5rem;
        font-size: 1.1rem;
      }

      /* Form Styles */
      .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #e2e8f0;
        font-size: 0.95rem;
      }

      .flex-row {
        display: flex;
        gap: 1rem;
      }
      .flex-row .form-group {
        flex: 1;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.85rem 1rem;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #fff;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
      }

      .form-group select option {
        background: #1e293b;
        color: #fff;
      }

      .optional-tag {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-left: 0.5rem;
        font-weight: normal;
      }

      .btn-finish {
        width: 100%;
        padding: 1rem;
        margin-top: 1rem;
        background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
      }

      .btn-finish:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(14, 165, 233, 0.6);
      }

      .btn-finish:active {
        transform: translateY(0);
      }

      /* Confetti implementation via JS */
      canvas#confetti {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>
    <canvas id="confetti"></canvas>

    <div class="onboarding-overlay">
      <div class="onboarding-popup">
        <div class="welcome-header">
          <span>??</span>
          <h1 class="onboarding-title" id="welcomeGreeting">Welcome!</h1>
          <p class="onboarding-subtitle">
            Just a few more details to set up your account.
          </p>
        </div>

        <div
          id="onboardingMessage"
          class="message"
          style="
            display: none;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            padding: 10px;
          "
        ></div>

        <form id="onboardingForm">
          <div class="form-group">
            <label>Are you a teacher or a student?</label>
            <div class="flex-row">
              <div class="form-group" style="margin-bottom: 0">
                <select id="role" name="role" required>
                  <option value="" disabled selected>Select Role</option>
                  <option value="student">Student ??</option>
                  <option value="teacher">Teacher ?????</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom: 0">
                <input
                  type="tel"
                  id="mobileNumber"
                  name="mobileNumber"
                  pattern="[0-9]{10}"
                  placeholder="10-digit mobile number"
                  required
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="linkedinUrl"
              >LinkedIn Profile
              <span class="optional-tag">(Optional)</span></label
            >
            <input
              type="url"
              id="linkedinUrl"
              name="linkedinUrl"
              placeholder="https://linkedin.com/in/username"
            />
          </div>

          <div class="form-group">
            <label for="githubUrl"
              >GitHub Profile
              <span class="optional-tag">(Optional)</span></label
            >
            <input
              type="url"
              id="githubUrl"
              name="githubUrl"
              placeholder="https://github.com/username"
            />
          </div>

          <button type="submit" class="btn-finish" id="finishBtn">
            Launch Dashboard ?
          </button>
        </form>
      </div>
    </div>

    <script>
      // Very simple confetti logic
      function fireConfetti() {
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        const colors = ["#f43f5e", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6"];

        for (let i = 0; i < 100; i++) {
          pieces.push({
            x: canvas.width / 2,
            y: canvas.height / 2 + 100,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 1) * 20 - 5,
            size: Math.random() * 10 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360,
            rs: (Math.random() - 0.5) * 10,
          });
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let active = false;
          pieces.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5; // gravity
            p.rotation += p.rs;
            if (p.y < canvas.height) active = true;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate((p.rotation * Math.PI) / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          });
          if (active) requestAnimationFrame(animate);
        }
        animate();
      }

      document.addEventListener("DOMContentLoaded", () => {
        // Set welcome message if user exists in localStorage
        const user = auth.getCurrentUser();
        let firstName = "there";
        if (user && user.name) {
          firstName = user.name.split(" ")[0]; // Just use first name for friendlier greeting
          document.getElementById("welcomeGreeting").textContent =
            `Welcome, ${firstName}!`;
        }

        const form = document.getElementById("onboardingForm");
        const msgDiv = document.getElementById("onboardingMessage");
        const btn = document.getElementById("finishBtn");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          const roleSelect = document.getElementById("role");
          if (!roleSelect.value) {
            msgDiv.className = "message error";
            msgDiv.textContent = "Please select a role";
            msgDiv.style.display = "block";
            msgDiv.style.background = "rgba(220, 38, 38, 0.2)";
            msgDiv.style.color = "#fca5a5";
            return;
          }

          window.toggleLoading(btn, true);
          msgDiv.style.display = "none";

          const formData = new FormData(form);
          const data = {
            role: formData.get("role"),
            mobileNumber: formData.get("mobileNumber"),
            linkedinUrl: formData.get("linkedinUrl"),
            githubUrl: formData.get("githubUrl"),
          };

          try {
            const res = await api.completeOnboarding(data);

            if (res.success) {
              fireConfetti();
              msgDiv.className = "message success";
              msgDiv.textContent = "Profile setup complete!";
              msgDiv.style.display = "block";
              msgDiv.style.background = "rgba(16, 185, 129, 0.2)";
              msgDiv.style.color = "#6ee7b7";

              // Update auth user data locally
              auth.setSession(auth.token, res.data);

              // Redirect to main index file!
              setTimeout(() => {
                window.location.href = "/";
              }, 2500); // give time for confetti animation!
            } else {
              msgDiv.className = "message error";
              msgDiv.textContent = res.message || "Something went wrong";
              msgDiv.style.display = "block";
              msgDiv.style.background = "rgba(220, 38, 38, 0.2)";
              msgDiv.style.color = "#fca5a5";
            }
          } catch (err) {
            msgDiv.className = "message error";
            msgDiv.textContent =
              err.message || "Network error. Please try again.";
            msgDiv.style.display = "block";
            msgDiv.style.background = "rgba(220, 38, 38, 0.2)";
            msgDiv.style.color = "#fca5a5";
          } finally {
            window.toggleLoading(btn, false);
          }
        });
      });
    </script>
  </body>
</html>
